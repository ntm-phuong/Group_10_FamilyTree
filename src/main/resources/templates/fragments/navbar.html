<header class="pub-nav-figma" th:fragment="navbar" xmlns:th="http://www.thymeleaf.org">
  <link rel="stylesheet" th:href="@{/css/navbar.css}">
  <a href="/" class="nav-logo-figma" id="navLogo">
    <img th:src="@{/images/logo-2.svg}" alt="Logo" class="logo-img">
  </a>

  <nav class="nav-links-figma">
    <a href="/" id="navHome"><i class="fas fa-home"></i> Trang Chủ</a>

    <a th:href="@{/about}" id="navAbout"><i class="fas fa-info-circle"></i> Giới thiệu</a>

    <a href="/family-tree" id="navFamilyTree" style="display: none;"><i class="fas fa-sitemap"></i> Gia Phả</a>

    <a href="/family-head" id="navFamilyHead" style="display: none;"><i class="fas fa-tachometer-alt"></i> Quản trị họ</a>

    <a th:href="@{/family-head}"
       id="navAdmin"
       style="display: none;"
       th:classappend="${activeMenu == 'dashboard' ? 'active' : ''}"
       class="sidebar-link"><i class="fas fa-th-large"></i> Quản Trị</a>

    <a href="/news" id="navNews"><i class="far fa-newspaper"></i> Tin Tức</a>
  </nav>

  <div class="nav-right-actions">
    <a href="#" class="btn btn-outline btn-open-login" id="navLoginBtn">
      <img th:src="@{/images/profile-circle.svg}" alt="Login" class="login-icon-mobile">

      <i class="fas fa-sign-in-alt login-icon-desktop"></i>
      <span class="login-text">Đăng nhập</span>
    </a>

    <div class="dropdown" id="navUserDropdown" style="display: none;">
      <div class="pub-nav-user">
        <span class="avatar" id="navAvatarInitials">G</span>
        <span id="navFullName">Guest</span>
        <i class="fas fa-chevron-down"></i>
      </div>

      <div class="dropdown-menu">
        <a href="/profile" class="dropdown-item" id="profileLink">Hồ sơ cá nhân</a>
        <a href="/admin" class="dropdown-item" id="navAdminDropdown" style="display: none;">Trang quản trị</a>
        <a href="#" class="dropdown-item logout-btn" id="navLogoutBtn">Đăng xuất</a>
      </div>
    </div>
  </div>

  <button class="nav-toggle-btn"><i class="fas fa-bars"></i></button>

  <script>
        document.addEventListener("DOMContentLoaded", function() {
            // Lấy thông tin từ trình duyệt
            const token = localStorage.getItem('token');
            const fullName = localStorage.getItem('full_name');
            const userId = localStorage.getItem('user_id');
            const roleId = localStorage.getItem('role_id');

            // Lấy các phần tử DOM
            const navLogo = document.getElementById('navLogo');
            const navHome = document.getElementById('navHome');
            const navFamilyTree = document.getElementById('navFamilyTree');
            const navFamilyHead = document.getElementById('navFamilyHead');
            const navAdmin = document.getElementById('navAdmin');
            const navAdminDropdown = document.getElementById('navAdminDropdown');
            const navLoginBtn = document.getElementById('navLoginBtn');
            const navUserDropdown = document.getElementById('navUserDropdown');
            const navFullName = document.getElementById('navFullName');
            const navAvatarInitials = document.getElementById('navAvatarInitials');
            const navLogoutBtn = document.getElementById('navLogoutBtn');
            const profileLink = document.getElementById('profileLink');
            const navNews = document.getElementById('navNews');

            // XỬ LÝ NÚT ĐĂNG NHẬP (Từ nhánh responsive)
            if (navLoginBtn) {
                navLoginBtn.addEventListener('click', function(e) {
                    const loginModal = document.getElementById('loginModal');
                    if (!loginModal) {
                        e.preventDefault();
                        window.location.href = '/?login=true';
                    }
                });
            }

            // XỬ LÝ MENU MOBILE (Từ nhánh responsive)
            const toggleBtn = document.querySelector('.nav-toggle-btn');
            const navLinks = document.querySelector('.nav-links-figma');

            if (toggleBtn && navLinks) {
                toggleBtn.addEventListener('click', function() {
                    navLinks.classList.toggle('active');
                    const icon = this.querySelector('i');
                    if(navLinks.classList.contains('active')){
                        icon.classList.remove('fa-bars');
                        icon.classList.add('fa-times');
                    } else {
                        icon.classList.remove('fa-times');
                        icon.classList.add('fa-bars');
                    }
                });
            }

            // XỬ LÝ GIAO DIỆN KHI ĐÃ ĐĂNG NHẬP
            if (token && fullName) {
                if (navLogo) navLogo.href = '/home';
                if (navHome) navHome.href = '/home';
                if (navFamilyTree) navFamilyTree.style.display = 'flex';

                // ==========================================
                // PHÂN QUYỀN KIỂU 1 (Từ nhánh responsive)
                // ==========================================
                if (roleId && roleId.toLowerCase() === 'role-head') {
                    if (navAdmin) navAdmin.style.display = 'flex';
                    if (navAdminDropdown) navAdminDropdown.style.display = 'block';
                }

                // ==========================================
                // PHÂN QUYỀN KIỂU 2 (Từ nhánh master)
                // ==========================================
                try {
                    const role = (localStorage.getItem('role') || '').trim();
                    const perms = JSON.parse(localStorage.getItem('permissions') || '[]');
                    const p = Array.isArray(perms) ? perms : [];
                    const showHead =
                        role === 'FAMILY_BRANCH_MANAGER' ||
                        role === 'ADMIN' ||
                        p.indexOf('MANAGE_FAMILY_MEMBERS') >= 0 ||
                        p.indexOf('MANAGE_CLAN') >= 0 ||
                        p.indexOf('FAMILY_HEAD') >= 0;
                    if (navFamilyHead && showHead) {
                        navFamilyHead.style.display = 'flex';
                    }
                } catch (e) { /* ignore */ }

                // Cập nhật UI Navbar
                if (navLoginBtn) navLoginBtn.style.display = 'none';
                if (navUserDropdown) navUserDropdown.style.display = 'inline-block';

                if (navFullName) navFullName.innerText = fullName;

                const nameParts = fullName.trim().split(' ');
                let initials = '';
                if (nameParts.length >= 2) {
                    initials = nameParts[nameParts.length - 2].charAt(0) + nameParts[nameParts.length - 1].charAt(0);
                } else {
                    initials = fullName.charAt(0);
                }
                if (navAvatarInitials) navAvatarInitials.innerText = initials.toUpperCase();

                if (navNews) {
                    navNews.href = '/news';
                }
                if (profileLink) {
                    profileLink.href = (token && userId) ? `/member/${userId}` : '/profile';
                }
            }

            // XỬ LÝ NÚT ĐĂNG XUẤT (Gộp cả xóa cookie của nhánh master)
            if (navLogoutBtn) {
                navLogoutBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    document.cookie = 'accessToken=; path=/; max-age=0';
                    localStorage.clear();
                    window.location.href = '/';
                });
            }
        });
    </script>
</header>
