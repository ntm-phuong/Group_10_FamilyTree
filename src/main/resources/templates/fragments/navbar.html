<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<header class="pub-nav-figma" th:fragment="navbar">
    <a th:href="@{/}" class="nav-logo-figma" id="navLogo">
        <img th:src="@{/images/logo-2.png}" alt="Logo" class="logo-img">
        Gia Phả
    </a>

    <nav class="nav-links-figma">
        <a th:href="@{/}" id="navHome"><i class="fas fa-home"></i> Trang Chủ</a>
        <a th:href="@{/family-tree}" id="navFamilyTree" style="display: none;"><i class="fas fa-sitemap"></i> Gia Phả</a>
        <a th:href="@{/news}" id="navNews"><i class="far fa-newspaper"></i> Tin Tức</a>
        <a th:href="@{/admin}" id="navAdmin" style="display: none;"><i class="fas fa-th-large"></i> Quản Trị</a>
    </nav>

    <div class="nav-right-actions">
        <a th:href="@{/login}" class="btn btn-outline" id="navLoginBtn">
            <i class="fas fa-sign-in-alt"></i> Đăng nhập
        </a>

        <div class="dropdown" id="navUserDropdown" style="display: none;">
            <div class="pub-nav-user">
                <span class="avatar avatar-sm" id="navAvatarInitials" style="background: #E5E7EB; color: #111; font-weight: bold;">G</span>
                <span id="navFullName" style="margin-left: 8px; margin-right: 5px; font-weight: 500;">Guest</span>
                <i class="fas fa-chevron-down"></i>
            </div>

            <div class="dropdown-menu">
                <a th:href="@{/profile}" class="dropdown-item">Hồ sơ cá nhân</a>
                <a th:href="@{/admin}" class="dropdown-item">Trang quản trị</a>
                <a href="#" class="dropdown-item" id="navLogoutBtn" style="color: #dc3545; font-weight: 500;">Đăng xuất</a>
            </div>
        </div>
    </div>

    <button class="nav-toggle-btn"><i class="fas fa-bars"></i></button>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const token = localStorage.getItem("token");
            const fullName = localStorage.getItem("full_name");

            const navLogo = document.getElementById("navLogo");
            const navHome = document.getElementById("navHome");
            const navFamilyTree = document.getElementById("navFamilyTree");
            const navAdmin = document.getElementById("navAdmin");
            const navLoginBtn = document.getElementById("navLoginBtn");
            const navUserDropdown = document.getElementById("navUserDropdown");
            const navFullName = document.getElementById("navFullName");
            const navAvatarInitials = document.getElementById("navAvatarInitials");
            const navLogoutBtn = document.getElementById("navLogoutBtn");

            if (token && fullName) {
                navLogo.href = "/home";
                navHome.href = "/home";
                navFamilyTree.style.display = "flex";
                navAdmin.style.display = "flex";
                navLoginBtn.style.display = "none";
                navUserDropdown.style.display = "inline-block";
                navFullName.innerText = fullName;

                const nameParts = fullName.trim().split(" ");
                let initials = "";

                if (nameParts.length >= 2) {
                    initials = nameParts[nameParts.length - 2].charAt(0) + nameParts[nameParts.length - 1].charAt(0);
                } else {
                    initials = fullName.charAt(0);
                }

                navAvatarInitials.innerText = initials.toUpperCase();
            }

            if (navLogoutBtn) {
                navLogoutBtn.addEventListener("click", function(e) {
                    e.preventDefault();
                    localStorage.clear();
                    window.location.href = "/";
                });
            }
        });
    </script>
</header>
</body>
</html>
