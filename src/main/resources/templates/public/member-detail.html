<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Chi tiet thanh vien</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
<th:block th:replace="~{fragments/navbar :: navbar}"/>

<main class="member-page-shell">
    <div class="member-profile-layout">
        <section class="member-page-card member-page-header-card">
            <div class="member-page-header-main">
                <div class="member-avatar-wrap member-avatar-wrap-lg">
                    <img id="memberAvatar" class="member-avatar-img member-avatar-img-lg" src="" alt="Avatar thanh vien"/>
                    <div id="memberAvatarFallback" class="member-avatar-fallback member-avatar-fallback-lg">M</div>
                </div>
                <div class="member-header-copy">
                    <span class="badge badge-green">Ho so thanh vien</span>
                    <h1 id="memberFullName">Dang tai du lieu...</h1>
                    <p id="memberMeta" class="member-header-meta">Thong tin ca nhan</p>
                    <div class="member-header-inline-meta">
                        <span><i class="fas fa-venus-mars"></i> <span id="memberGenderBadge">-</span></span>
                        <span><i class="fas fa-cake-candles"></i> <span id="memberDobBadge">-</span></span>
                        <span><i class="fas fa-location-dot"></i> <span id="memberAddressMeta">-</span></span>
                    </div>
                </div>
                <div class="member-header-actions">
                    <a th:href="@{/edit-member-detail}" class="btn btn-primary member-action-btn">
                        <i class="fas fa-pen"></i> Chinh sua thong tin
                    </a>
                </div>
            </div>
        </section>

        <div class="member-content-grid">
            <section class="member-content-main">
                <div class="member-page-card member-section-card">
                    <div class="card-header">
                        <div class="card-header-left">
                            <h3>Thong tin ca nhan</h3>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="member-info-grid">
                            <div class="member-info-item">
                                <label><i class="fas fa-venus-mars"></i> Gioi tinh</label>
                                <span id="memberGender">-</span>
                            </div>
                            <div class="member-info-item">
                                <label><i class="fas fa-cake-candles"></i> Ngay sinh</label>
                                <span id="memberDateOfBirth">-</span>
                            </div>
                            <div class="member-info-item">
                                <label><i class="fas fa-envelope"></i> Email</label>
                                <span id="memberEmail">-</span>
                            </div>
                            <div class="member-info-item">
                                <label><i class="fas fa-phone"></i> So dien thoai</label>
                                <span id="memberPhone">-</span>
                            </div>
                            <div class="member-info-item member-info-item-wide">
                                <label><i class="fas fa-location-dot"></i> Dia chi</label>
                                <span id="memberAddress">-</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="member-page-card member-section-card">
                    <div class="card-header">
                        <div class="card-header-left">
                            <h3>Mo ta</h3>
                        </div>
                    </div>
                    <div class="card-body">
                        <p id="memberDescription" class="member-description">-</p>
                    </div>
                </div>
            </section>

            <aside class="member-content-side">
                <div class="member-page-card member-section-card">
                    <div class="card-header">
                        <div class="card-header-left">
                            <h3>Quan he gia dinh</h3>
                        </div>
                    </div>
                    <div class="card-body member-relations-stack">
                        <div class="member-relation-group">
                            <div class="member-relation-title">Cha me</div>
                            <div id="memberParents" class="member-relations-list"></div>
                        </div>
                        <div class="member-relation-group">
                            <div class="member-relation-title">Vo chong</div>
                            <div id="memberSpouse" class="member-relations-list"></div>
                        </div>
                        <div class="member-relation-group">
                            <div class="member-relation-title">Con cai</div>
                            <div id="memberChildren" class="member-relations-list"></div>
                        </div>
                    </div>
                </div>
            </aside>
        </div>
    </div>
</main>

<th:block th:replace="~{fragments/footer :: footer}"/>
<script th:src="@{/js/main.js}"></script>
<script th:src="@{/js/member-detail.js}"></script>
</body>
</html>
