<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kích hoạt tài khoản – Gia Phả</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="login-page-bg">
<th:block th:replace="~{fragments/navbar :: navbar}"/>

<main class="login-wrapper">
    <div class="login-card-figma">
        <div style="text-align: center; margin-bottom: 1.5rem;">
            <div style="width: 60px; height: 60px; background-color: var(--green-50); color: var(--green-700);
                            border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 1.8rem;">
                <i class="fas fa-check-circle"></i>
            </div>
        </div>

        <div class="login-header-figma">
            <h2>Kích hoạt tài khoản</h2>
            <p style="font-size: 0.9rem; line-height: 1.5; color: var(--text-700);">
                Chào mừng bạn! Vui lòng cập nhật thông tin <br> và đổi mật khẩu để bắt đầu sử dụng.
            </p>
        </div>

        <form id="activeForm">
            <div class="form-group-figma">
                <label for="fullName">Họ và tên</label>
                <div class="input-icon-wrap-figma">
                    <i class="far fa-user"></i>
                    <input type="text" id="fullName" name="fullName" required placeholder="Nhập tên của bạn">
                </div>
            </div>

            <div class="form-group-figma">
                <label for="password">Mật khẩu mới</label>
                <div class="input-icon-wrap-figma">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" name="password" required placeholder="Nhập mật khẩu mới">
                    <i class="far fa-eye-slash toggle-pw" onclick="togglePw('password', this)"></i>
                </div>
            </div>

            <div class="form-group-figma">
                <label for="confirmPassword">Xác nhận mật khẩu</label>
                <div class="input-icon-wrap-figma">
                    <i class="fas fa-shield-alt"></i>
                    <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Nhập lại mật khẩu">
                    <i class="far fa-eye-slash toggle-pw" onclick="togglePw('confirmPassword', this)"></i>
                </div>
            </div>

            <button type="submit" class="btn-login-submit">Kích hoạt & Vào Gia Phả</button>
        </form>
    </div>
</main>

<th:block th:replace="~{fragments/footer :: footer}"/>

<script th:inline="javascript">
    function togglePw(id, el) {
        const input = document.getElementById(id);
        if (input.type === "password") {
            input.type = "text";
            el.classList.replace('fa-eye-slash', 'fa-eye');
        } else {
            input.type = "password";
            el.classList.replace('fa-eye', 'fa-eye-slash');
        }
    }

    const activeForm = document.getElementById('activeForm');

    activeForm.addEventListener('submit', function (e) {
        e.preventDefault(); // Chặn form load lại trang

        const btnSubmit = document.querySelector('.btn-login-submit');
        const password = document.querySelector('#password').value;
        const confirmPassword = document.querySelector('#confirmPassword').value;

        if (password !== confirmPassword) {
            alert("Mật khẩu xác nhận không khớp!");
            return;
        }

        btnSubmit.innerText = "Đang xử lý...";
        btnSubmit.disabled = true;

        fetch('/api/auth/active', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + localStorage.getItem('token')
            },
            body: JSON.stringify({
                userId: localStorage.getItem('user_id'),
                fullName: document.querySelector('#fullName').value,
                password: password
            })
        })
        .then(response => {
            if (response.ok) {
                alert("Kích hoạt thành công! Vui lòng đăng nhập lại với mật khẩu mới.");
                localStorage.clear();
                window.location.href = '/login';
            } else {
                throw new Error("Lỗi cập nhật dữ liệu từ Server!");
            }
        })
        .catch(err => {
            alert(err.message);
            btnSubmit.innerText = "Kích hoạt & Vào Gia Phả";
            btnSubmit.disabled = false;
        });
    });
</script>
</body>
</html>
