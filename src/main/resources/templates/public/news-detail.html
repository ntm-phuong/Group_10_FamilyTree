<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title th:text="${article.title} + ' – Tin tức'">Chi tiết tin</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class"
    };
  </script>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

  <style>
    body { font-family: 'Manrope', sans-serif; }
    .font-headline { font-family: 'Noto Serif', serif; }
  </style>
</head>

<body class="bg-[#fafaf5] text-gray-800">

<!-- NAVBAR -->
<th:block th:replace="~{fragments/navbar :: navbar}"/>

<main class="max-w-6xl mx-auto px-6 py-10">

  <!-- Breadcrumb -->
  <div class="mb-6 text-sm text-gray-500 flex gap-2 items-center">
    <a th:href="@{/home}">Home</a> →
    <a th:href="@{/news}">Tin tức</a> →
    <span class="text-gray-800" th:text="${article.title}">Title</span>
  </div>

  <!-- Back -->
  <a th:href="@{/news}" class="text-sm text-green-700 hover:underline mb-8 inline-block">
    ← Quay lại
  </a>

  <div class="grid lg:grid-cols-12 gap-10">

    <!-- LEFT -->
    <article class="lg:col-span-8 space-y-6">

      <!-- CARD -->
      <div class="bg-white rounded-xl shadow-sm overflow-hidden border">

        <!-- IMAGE -->
        <div class="w-full aspect-[21/9] overflow-hidden">
          <img th:if="${article.coverImage != null}"
               th:src="${article.coverImage}"
               class="w-full h-full object-cover"/>
        </div>

        <!-- CONTENT -->
        <div class="p-8 space-y-6">

          <!-- TAGS -->
          <div class="flex gap-2 flex-wrap">
            <span class="px-3 py-1 bg-green-700 text-white text-xs rounded-full"
                  th:text="${article.publicCategory != null ? article.publicCategory.label : '—'}">
              Danh mục
            </span>

            <span th:if="${article.featured}"
                  class="px-3 py-1 bg-yellow-500 text-white text-xs rounded-full">
              ⭐ Nổi bật
            </span>

            <span th:if="${article.visibility != null and article.visibility.name() == 'FAMILY_ONLY'}"
                  class="px-3 py-1 bg-gray-300 text-xs rounded-full">
              Nội bộ
            </span>
          </div>

          <!-- TITLE -->
          <h1 class="font-headline text-3xl font-bold leading-tight"
              th:text="${article.title}">
          </h1>

          <!-- META -->
          <div class="flex items-center justify-between border-y py-4 text-sm text-gray-500">

            <div class="flex items-center gap-3">
              <div class="w-10 h-10 rounded-full bg-green-200 flex items-center justify-center font-bold">
                <span th:text="${#strings.substring(article.user.fullName,0,1)}">A</span>
              </div>

              <div>
                <div class="font-semibold text-gray-800"
                     th:text="${article.user != null ? article.user.fullName : 'Admin'}"></div>
                <div th:text="${#temporals.format(article.createdAt, 'dd/MM/yyyy HH:mm')}"></div>
              </div>
            </div>

            <div>
              👁 <span th:text="${article.viewCount}">0</span>
            </div>
          </div>

          <!-- SUMMARY -->
          <div th:if="${article.summary != null}"
               class="bg-green-50 border-l-4 border-green-700 p-4 italic">
            <span th:text="${article.summary}"></span>
          </div>

          <!-- CONTENT -->
          <div class="prose max-w-none"
               th:utext="${article.content}">
          </div>

        </div>
      </div>

    </article>

    <!-- RIGHT SIDEBAR -->
    <aside class="lg:col-span-4 space-y-6">

      <!-- CATEGORY -->
      <div class="bg-white p-6 rounded-xl border shadow-sm">
        <h3 class="font-headline font-bold mb-4">Danh mục</h3>

        <div class="flex flex-wrap gap-2">
          <a th:href="@{/news}"
             class="px-3 py-1 border rounded-full text-sm hover:bg-gray-100">
            Tất cả
          </a>

          <a th:each="c : ${categories}"
             th:href="@{/news(category=${c.name()})}"
             class="px-3 py-1 border rounded-full text-sm"
             th:classappend="${article.publicCategory == c} ? ' bg-green-700 text-white' : ''"
             th:text="${c.label}">
          </a>
        </div>
      </div>

      <!-- RELATED -->
      <div class="bg-white p-6 rounded-xl border shadow-sm">
        <h3 class="font-headline font-bold mb-4">Bài viết liên quan</h3>

        <div class="space-y-4">

          <div th:each="r : ${relatedArticles}" class="flex gap-3">

            <div class="w-16 h-16 overflow-hidden rounded">
              <img th:if="${r.coverImage != null}"
                   th:src="${r.coverImage}"
                   class="w-full h-full object-cover"/>
            </div>

            <div>
              <a th:href="@{/news/{slug}(slug=${r.slug})}"
                 class="font-semibold text-sm hover:text-green-700"
                 th:text="${r.title}">
              </a>

              <div class="text-xs text-gray-500"
                   th:text="${#temporals.format(r.createdAt,'dd/MM/yyyy')}"></div>
            </div>

          </div>

        </div>
      </div>

    </aside>

  </div>

</main>

<th:block th:replace="~{fragments/footer :: footer}"/>

</body>
</html>
