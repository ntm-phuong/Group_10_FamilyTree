<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="${article.title} + ' – Tin tức'">Chi tiết tin tức</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
<th:block th:replace="~{fragments/navbar :: navbar}"/>

<div class="section-inner" style="padding:2rem 1.25rem 3rem;">
<div class="news-detail-layout">
  <div class="news-content">
    <div class="breadcrumb" style="padding-top:.5rem;">
      <a th:href="@{/home}"><i class="fas fa-home"></i></a>
      <span class="breadcrumb-sep">&gt;</span>
      <a th:href="@{/news}">Tin tức</a>
      <span class="breadcrumb-sep">&gt;</span>
      <span class="truncate" th:text="${article.title}">Bài viết</span>
    </div>

    <a th:href="@{/news}" class="btn btn-ghost btn-sm mb-4" style="padding:.35rem .6rem;">
      <i class="fas fa-arrow-left"></i> Quay lại
    </a>

    <div class="card">
      <div class="card-body" style="padding:1.75rem;">
        <div style="display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;margin-bottom:1rem;">
          <span class="badge badge-green" th:text="${article.category.label}">Danh mục</span>
          <span th:if="${article.featured}" class="badge badge-orange"><i class="fas fa-star"></i> Nổi bật</span>
        </div>

        <h1 style="font-size:1.5rem;font-weight:700;line-height:1.3;margin-bottom:1rem;" th:text="${article.title}">Tiêu đề</h1>

        <div style="display:flex;align-items:center;gap:1.5rem;padding:.75rem 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin-bottom:1.5rem;">
          <div style="display:flex;align-items:center;gap:.6rem;">
            <div class="avatar avatar-sm avatar-male">
              <span th:with="auth=${article.author != null and article.author.fullName != null ? article.author.fullName : 'B'}"
                    th:text="${#strings.substring(auth, 0, 1)}">A</span>
            </div>
            <div>
              <div style="font-size:.83rem;font-weight:600;"
                   th:text="${article.author != null ? article.author.fullName : 'Ban quản trị'}">Tác giả</div>
              <div class="text-xs text-muted"
                   th:text="${article.createdAt != null ? #temporals.format(article.createdAt, 'dd/MM/yyyy HH:mm') : '—'}">Ngày</div>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:.4rem;font-size:.8rem;color:var(--text-500);">
            <i class="fas fa-eye"></i>
            <span th:text="${article.viewCount}">0</span> lượt xem
          </div>
        </div>

        <div th:if="${article.summary != null and !article.summary.isEmpty()}"
             style="background:var(--green-50);border-left:3px solid var(--green-600);padding:.85rem 1rem;border-radius:0 var(--radius) var(--radius) 0;margin-bottom:1.5rem;font-style:italic;font-size:.9rem;color:var(--text-700);"
             th:text="${article.summary}"></div>

        <div class="news-article-body" th:utext="${article.content}">Nội dung</div>
      </div>
    </div>
  </div>

  <div class="news-sidebar">
    <div class="card mb-4">
      <div class="card-header"><h3>Danh mục</h3></div>
      <div class="card-body" style="padding:.75rem;">
        <div style="display:flex;flex-wrap:wrap;gap:.4rem;">
          <a th:href="@{/news}" class="news-cat-tab" style="font-size:.78rem;">Tất cả</a>
          <a th:each="c : ${categories}"
             th:href="@{/news(category=${c.name()})}"
             class="news-cat-tab"
             th:classappend="${article.category == c} ? ' active' : ''"
             style="font-size:.78rem;"
             th:text="${c.label}">Danh mục</a>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header"><h3>Bài viết liên quan</h3></div>
      <div class="card-body" style="padding:.75rem 1rem;">
        <div th:if="${#lists.isEmpty(relatedArticles)}" class="text-sm text-muted">Chưa có bài liên quan.</div>
        <div th:each="r : ${relatedArticles}"
             style="margin-bottom:.75rem;padding-bottom:.75rem;border-bottom:1px solid var(--border);">
          <a th:href="@{/news/{slug}(slug=${r.slug})}"
             style="font-size:.83rem;font-weight:600;color:var(--text-900);line-height:1.4;display:block;"
             th:text="${r.title}">Tiêu đề</a>
        </div>
      </div>
    </div>
  </div>
</div>
</div>

<th:block th:replace="~{fragments/footer :: footer}"/>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
