<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chi tiet tin tuc</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
  <link rel="stylesheet" th:href="@{/css/news.css}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>

<div class="news-detail-layout">
  <div class="news-content">
    <div class="breadcrumb" style="padding-top:.5rem;">
      <a href="/"><i class="fas fa-home"></i></a>
      <span class="breadcrumb-sep">></span>
      <a href="/news">Tin tuc</a>
      <span class="breadcrumb-sep">></span>
      <span class="truncate" id="newsDetailBreadcrumbTitle">Bai viet</span>
    </div>

    <a href="/news" class="btn btn-ghost btn-sm mb-4" style="padding:.35rem .6rem;">
      <i class="fas fa-arrow-left"></i> Quay lai
    </a>

    <div class="card">
      <div class="card-body" style="padding:1.75rem;">
        <div style="display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;margin-bottom:1rem;">
          <span class="badge badge-green" id="newsDetailCategory">Su kien</span>
          <span id="newsDetailFeatured" class="badge badge-orange" style="display:none;"><i class="fas fa-star"></i> Noi bat</span>
        </div>

        <h1 id="newsDetailTitle" style="font-size:1.5rem;font-weight:700;line-height:1.3;margin-bottom:1rem;">Tieu de</h1>

        <div style="display:flex;align-items:center;gap:1.5rem;padding:.75rem 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin-bottom:1.5rem;">
          <div style="display:flex;align-items:center;gap:.6rem;">
            <div class="avatar avatar-sm avatar-male"><span id="newsDetailAuthorInitial">A</span></div>
            <div>
              <div style="font-size:.83rem;font-weight:600;" id="newsDetailAuthor">Tac gia</div>
              <div class="text-xs text-muted" id="newsDetailDate">Ngay dang</div>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:.4rem;font-size:.8rem;color:var(--text-500);">
            <i class="fas fa-eye"></i>
            <span id="newsDetailViewCount">0</span> luot xem
          </div>
        </div>

        <div id="newsDetailSummary" style="background:var(--green-50);border-left:3px solid var(--green-600);padding:.85rem 1rem;border-radius:0 var(--radius) var(--radius) 0;margin-bottom:1.5rem;font-style:italic;font-size:.9rem;color:var(--text-700);"></div>

        <div class="news-article-body" id="newsDetailContent">Noi dung</div>
      </div>
    </div>
  </div>

  <div class="news-sidebar">
    <div class="card mb-4">
      <div class="card-header"><h3>Danh muc</h3></div>
      <div class="card-body" style="padding:.75rem;">
        <div id="newsDetailCategoryTabs" style="display:flex;flex-wrap:wrap;gap:.4rem;"></div>
      </div>
    </div>

    <div class="card">
      <div class="card-header"><h3>Bai viet lien quan</h3></div>
      <div class="card-body" style="padding:.75rem 1rem;" id="newsRelatedList"></div>
    </div>
  </div>
</div>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
