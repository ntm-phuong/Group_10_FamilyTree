<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Giới thiệu – Dòng Họ Nguyễn</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
<th:block th:replace="~{fragments/navbar :: navbar}"/>

<div style="max-width:900px;margin:0 auto;padding:2rem 1.5rem;">
    <div class="breadcrumb"><a th:href="@{/}"><i class="fas fa-home"></i></a><span class="breadcrumb-sep">›</span><span>Giới thiệu</span></div>

    <h1 style="font-size:1.5rem;font-weight:700;margin-bottom:1.5rem;">Giới thiệu Dòng Họ Nguyễn</h1>

    <div th:if="${familyInfo == null}" class="empty-state"><i class="fas fa-info-circle"></i><h3>Chưa có thông tin</h3></div>

    <div th:if="${familyInfo != null}" style="display:grid;gap:1.25rem;">
        <div class="card">
            <div class="card-header"><h3><i class="fas fa-info-circle" style="color:var(--green-700);"></i> Thông tin cơ bản</h3></div>
            <div class="card-body">
                <div class="profile-detail-grid">
                    <div class="profile-detail-item"><label>Tên dòng họ</label><span th:text="${familyInfo.name}">–</span></div>
                    <div class="profile-detail-item"><label>Nguồn gốc</label><span th:text="${familyInfo.origin != null ? familyInfo.origin : '–'}">–</span></div>
                    <div class="profile-detail-item"><label>Nơi phát tích</label><span th:text="${familyInfo.originPlace != null ? familyInfo.originPlace : '–'}">–</span></div>
                    <div class="profile-detail-item"><label>Năm khởi tổ</label><span th:text="${familyInfo.foundingYear != null ? familyInfo.foundingYear : '–'}">–</span></div>
                    <div class="profile-detail-item"><label>Quê hương</label><span th:text="${familyInfo.ancestralHome != null ? familyInfo.ancestralHome : '–'}">–</span></div>
                </div>
                <div th:if="${familyInfo.motto != null}" style="margin-top:1rem;background:var(--green-50);border-left:3px solid var(--green-600);padding:.85rem 1rem;border-radius:0 var(--radius) var(--radius) 0;font-style:italic;color:var(--green-800);" th:text="${familyInfo.motto}"></div>
            </div>
        </div>
        <div class="card" th:if="${familyInfo.description != null}">
            <div class="card-header"><h3>Lịch sử</h3></div>
            <div class="card-body"><p style="font-size:.9rem;color:var(--text-700);line-height:1.75;" th:text="${familyInfo.description}"></p></div>
        </div>
        <div class="card">
            <div class="card-header"><h3>Liên hệ</h3></div>
            <div class="card-body">
                <div class="profile-detail-grid">
                    <div class="profile-detail-item" th:if="${familyInfo.phone != null}"><label><i class="fas fa-phone"></i> Điện thoại</label><span th:text="${familyInfo.phone}">–</span></div>
                    <div class="profile-detail-item" th:if="${familyInfo.contactEmail != null}"><label><i class="fas fa-envelope"></i> Email</label><span th:text="${familyInfo.contactEmail}">–</span></div>
                    <div class="profile-detail-item" th:if="${familyInfo.address != null}"><label><i class="fas fa-map-marker-alt"></i> Địa chỉ</label><span th:text="${familyInfo.address}">–</span></div>
                </div>
            </div>
        </div>
        <div class="stat-grid">
            <div class="stat-card"><div class="stat-label">Tổng thành viên</div><div class="stat-value" th:text="${stats.totalMembers}">0</div></div>
            <div class="stat-card"><div class="stat-label">Thế hệ</div><div class="stat-value" th:text="${stats.totalGenerations}">0</div></div>
            <div class="stat-card"><div class="stat-label">Còn sống</div><div class="stat-value" th:text="${stats.livingCount}">0</div></div>
            <div class="stat-card"><div class="stat-label">Đã mất</div><div class="stat-value" th:text="${stats.deceasedCount}">0</div></div>
        </div>
    </div>
</div>

<th:block th:replace="~{fragments/footer :: footer}"/>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
