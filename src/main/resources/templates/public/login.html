<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập – Gia Phả</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="login-page-bg">

<th:block th:replace="~{fragments/navbar :: navbar}"/>

<main class="login-wrapper">
    <div class="login-card-figma">
        <div class="login-header-figma">
            <h2>Đăng nhập</h2>
            <p>Hệ thống quản lý gia phả họ Nguyễn</p>
        </div>

        <div th:if="${param.error}" class="alert alert-error">
            <i class="fas fa-exclamation-circle"></i> Email hoặc mật khẩu không đúng.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-group-figma">
                <label for="email">Email</label>
                <div class="input-icon-wrap-figma">
                    <i class="far fa-envelope"></i>
                    <input type="email" id="email" name="username" required placeholder="Nhập email của bạn">
                </div>
            </div>

            <div class="form-group-figma">
                <div class="label-flex">
                    <label for="password">Mật khẩu</label>
                    <a href="#" class="forgot-pw">Quên mật khẩu?</a>
                </div>
                <div class="input-icon-wrap-figma">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" name="password" required placeholder="••••••••">
                    <i class="far fa-eye-slash toggle-pw" id="togglePassword"></i>
                </div>
            </div>

            <button type="submit" class="btn-login-submit">Đăng nhập</button>
        </form>

        <div class="login-contact-admin">
            Chưa có tài khoản? Liên hệ <a href="#"><strong>Ban Quản Trị</strong></a> để được cấp quyền
        </div>
    </div>
</main>

<th:block th:replace="~{fragments/footer :: footer}"/>

<script th:inline="javascript">
    // 1. Xử lý ẩn/hiện mật khẩu
    const togglePassword = document.querySelector('#togglePassword');
    const passwordInput = document.querySelector('#password');

    if (togglePassword) {
        togglePassword.addEventListener('click', function () {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.classList.toggle('fa-eye-slash');
            this.classList.toggle('fa-eye');
        });
    }

    // 2. XỬ LÝ ĐĂNG NHẬP QUA API
    const loginForm = document.querySelector('form');

    loginForm.addEventListener('submit', function (e) {
        e.preventDefault(); // Ngăn trang web tải lại theo kiểu truyền thống

        const emailValue = document.querySelector('#email').value;
        const passwordValue = passwordInput.value;
        const btnSubmit = document.querySelector('.btn-login-submit');

        // Hiệu ứng chờ
        btnSubmit.innerText = "Đang xác thực...";
        btnSubmit.disabled = true;

        // Gọi API Đăng nhập
        fetch('/api/auth/login', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                email: emailValue,      // Đúng tên trường trong LoginRequest.java
                password: passwordValue
            })
        })
        .then(response => {
            if (response.ok) {
                return response.json();
            } else {
                return response.text().then(text => {
                    throw new Error("Tài khoản hoặc mật khẩu không chính xác!");
                });
            }
        })
        .then(data => {
            console.log("Dữ liệu nhận được:", data);

            if (data.accessToken) {
                // Lưu token và thông tin vào localStorage
                localStorage.setItem('token', data.accessToken);
                localStorage.setItem('full_name', data.fullName);
                localStorage.setItem('user_id', data.userId);

                // Chuyển status về kiểu Number để so sánh chính xác với số 1 trong DB
                const userStatus = data.status !== null ? Number(data.status) : 0;

                if (userStatus === 1) {
                    // Nếu status là 1 (PENDING), chuyển sang trang active
                    console.log("Tài khoản mới, chuyển hướng sang trang Active...");
                    window.location.href = '/active';
                } else {
                    // Nếu status là 2 hoặc khác 1 (ACTIVE), vào thẳng Home
                    console.log("Tài khoản đã kích hoạt, vào trang Home...");
                    window.location.href = '/home';
                }
            }
        })
        .catch(error => {
            // Hiển thị thông báo lỗi (bạn có thể tạo một thẻ div lỗi riêng)
            alert(error.message);

            // Trả lại trạng thái nút bấm
            btnSubmit.innerText = "Đăng nhập";
            btnSubmit.disabled = false;
        });
    });
</script>
</body>
</html>
