services:
  mysql:
    image: mysql:8.0.31
    container_name: family-app-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: Mp7124002@
      MYSQL_DATABASE: family_management_db
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./family_management_db.sql:/docker-entrypoint-initdb.d/01-family_management_db.sql:ro
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

volumes:
  mysql_data:
